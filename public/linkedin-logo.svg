<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect width="300" height="300" rx="24" fill="#0F172A"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#F59E0B" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="300" height="300" rx="24" fill="url(#grid)"/>

  <!-- Amber accent bar -->
  <rect x="0" y="0" width="300" height="4" rx="0" fill="#F59E0B"/>

  <!-- PF monogram -->
  <text x="150" y="145" font-family="Georgia, 'Playfair Display', serif" font-weight="700" font-size="88" fill="#F59E0B" text-anchor="middle" letter-spacing="-2">PF</text>

  <!-- Divider line -->
  <line x1="90" y1="165" x2="210" y2="165" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>

  <!-- Company name -->
  <text x="150" y="195" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="20" fill="#FFFFFF" text-anchor="middle" letter-spacing="6">& CO HOLDINGS</text>

  <!-- Tagline -->
  <text x="150" y="230" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#F59E0B" text-anchor="middle" letter-spacing="4" opacity="0.8">SITE INTELLIGENCE</text>
</svg>