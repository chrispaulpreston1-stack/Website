<svg xmlns="http://www.w3.org/2000/svg" width="1128" height="191" viewBox="0 0 1128 191">
  <rect width="1128" height="191" fill="#0F172A"/>

  <!-- Subtle engineering grid -->
  <defs>
    <pattern id="engGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F59E0B" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F172A" stop-opacity="1"/>
      <stop offset="0.15" stop-color="#0F172A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.85" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1128" height="191" fill="url(#engGrid)"/>
  <rect width="1128" height="191" fill="url(#fadeLeft)"/>
  <rect width="1128" height="191" fill="url(#fadeRight)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1128" height="3" fill="#F59E0B"/>

  <!-- Left section: Brand -->
  <text x="114" y="85" font-family="Georgia, 'Playfair Display', serif" font-weight="700" font-size="42" fill="#F59E0B" letter-spacing="-1">PF</text>
  <text x="114" y="115" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#FFFFFF" letter-spacing="5">& CO HOLDINGS</text>

  <!-- Vertical divider -->
  <line x1="310" y1="40" x2="310" y2="151" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>

  <!-- Centre: Main message -->
  <text x="564" y="72" font-family="Georgia, 'Playfair Display', serif" font-weight="700" font-size="28" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">Site Intelligence</text>
  <text x="564" y="105" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#94A3B8" text-anchor="middle" letter-spacing="1">Know the risk before you break ground.</text>

  <!-- Bottom stats bar -->
  <line x1="380" y1="128" x2="748" y2="128" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>

  <text x="420" y="155" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#F59E0B" text-anchor="middle">25+</text>
  <text x="420" y="170" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#64748B" text-anchor="middle" letter-spacing="1.5">DATA SOURCES</text>

  <text x="564" y="155" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#F59E0B" text-anchor="middle">48hr</text>
  <text x="564" y="170" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#64748B" text-anchor="middle" letter-spacing="1.5">DELIVERY</text>

  <text x="708" y="155" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#F59E0B" text-anchor="middle">15</text>
  <text x="708" y="170" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#64748B" text-anchor="middle" letter-spacing="1.5">REPORT TYPES</text>

  <!-- Right section: Website -->
  <text x="1014" y="100" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#64748B" text-anchor="middle" letter-spacing="2">PFCOSITEINTELLIGENCE.CO.UK</text>
</svg>